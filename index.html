<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Industry Insights Summary Tool</title>
</head>
<body>

<h2>Paste Bulletin HTML</h2>
<textarea id="htmlInput" rows="15" cols="100"></textarea><br><br>

<button onclick="runAwards()">Extract Contract Awards</button>

<h3>Output</h3>
<pre id="output"></pre>

<script>
function runAwards() {
  const html = document.getElementById('htmlInput').value;
  const results = extractContractAwardsFromHTML(html);
  document.getElementById('output').textContent = JSON.stringify(results, null, 2);
}

function extractContractAwardsFromHTML(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');

  const awards = [];
  let inAwardsSection = false;

  function normalize(text) {
    return (text || '')
      .toLowerCase()
      .replace(/\s+/g, ' ')
      .trim();
  }

  function isAwardsStart(text) {
    const t = normalize(text);
    return (
      t.includes('contracts awarded') ||
      t.includes('contract awards') ||
      t.includes('awarded contracts')
    );
  }

  function isAwardsEnd(text) {
    const t = normalize(text);
    return t.includes('minutes');
  }

  function isLikelyAwardTitle(el) {
    const text = el.textContent.trim();
    if (!text || text.length < 10) return false;

    let score = 0;

    if (el.tagName === 'A') score += 2;

    const style = (el.getAttribute('style') || '').toLowerCase();
    if (style.includes('#2a') || style.includes('#3a') || style.includes('teal')) score += 2;

    if (/services|contract|maintenance|works|framework/i.test(text)) score += 2;
    if (text.length > 20) score += 1;

    return score >= 3;
  }

  const elements = doc.querySelectorAll('a, div, span');

  for (let i = 0; i < elements.length; i++) {
    const el = elements[i];
    const text = el.textContent.trim();

    if (!text) continue;

    // START DETECTION
    if (!inAwardsSection && isAwardsStart(text)) {
      inAwardsSection = true;
      console.log('✅ START:', text);
      continue;
    }

    if (!inAwardsSection) continue;

    // END DETECTION
    if (isAwardsEnd(text)) {
      console.log('🛑 END:', text);
      break;
    }

    // TITLE DETECTION
    if (isLikelyAwardTitle(el)) {
      const title = text;

      const container = el.closest('div') || el.parentElement;

      let raw = container ? container.innerText : '';

      function get(label) {
        const regex = new RegExp(label + '\\s*:?\\s*(.+)', 'i');
        const match = raw.match(regex);
        return match ? match[1].split('\n')[0].trim() : '';
      }

      const award = {
        title,
        client: get('Council|Authority|Client'),
        location: get('Location'),
        value: get('Value'),
        winner: get('Winner'),
        term: get('Term'),
        pt: get('PT')
      };

      console.log('🏆 FOUND:', award.title);

      awards.push(award);
    }
  }

  if (!awards.length) {
    alert(`No Housing contract awards found.

Checklist:
1. Paste FULL HTML (Ctrl+U → Ctrl+A → Copy)
2. Ensure "Contracts Awarded" exists
3. Open Console (F12) to debug`);
  }

  return awards;
}
</script>

</body>
</html>
